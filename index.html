<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seattle · Large Developments</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #6c8ef5;
      --accent2: #a78bfa;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-left h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-left p {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat .num {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat .label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .controls label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 4px;
    }

    select, input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input[type="text"]:focus {
      border-color: var(--accent);
    }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .view-toggle {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }

    .view-toggle button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .view-toggle button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    main {
      padding: 20px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Map ── */
    #map-view { display: none; }
    #map { height: 600px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }

    /* ── Grid ── */
    #grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s, transform 0.1s;
      cursor: default;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .permit-num {
      font-family: monospace;
      font-size: 12px;
      color: var(--accent);
      background: rgba(108,142,245,0.12);
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      text-decoration: none;
    }
    .permit-num:hover { text-decoration: underline; }

    .permit-type-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(100,116,139,0.12);
      color: var(--muted);
    }
    .permit-type-tag.land-use         { background: rgba(240,147,251,0.12); color: #c084fc; }
    .permit-type-tag.new-construction { background: rgba(251,191,36,0.12);  color: var(--yellow); }
    .permit-type-tag.demolition       { background: rgba(248,113,113,0.12); color: var(--red); }
    .permit-type-tag.alteration       { background: rgba(251,146,60,0.12);  color: #fb923c; }

    .card-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .badge.issued    { background: rgba(251,191,36,0.15);  color: var(--yellow); }
    .badge.complete  { background: rgba(52,211,153,0.15);  color: var(--green); }
    .badge.review    { background: rgba(108,142,245,0.15); color: var(--accent); }
    .badge.pending   { background: rgba(167,139,250,0.15); color: var(--accent2); }
    .badge.cancelled { background: rgba(248,113,113,0.12); color: var(--red); }
    .badge.other     { background: rgba(100,116,139,0.15); color: var(--muted); }

    #map-legend {
      position: absolute;
      bottom: 24px;
      right: 10px;
      z-index: 1000;
      background: rgba(26,29,39,0.92);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text);
      pointer-events: none;
      backdrop-filter: blur(4px);
    }

    #map-legend .leg-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 7px;
    }

    .leg-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .leg-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25);
      flex-shrink: 0;
    }

    .use-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .use-tag.multifamily { background: rgba(99,179,237,0.15); color: #63b3ed; }
    .use-tag.office      { background: rgba(154,205,50,0.15);  color: #a3d977; }
    .use-tag.mixed-use   { background: rgba(240,147,251,0.15); color: #e879f9; }
    .use-tag.commercial  { background: rgba(251,146,60,0.15);  color: #fb923c; }
    .use-tag.other       { background: rgba(100,116,139,0.12); color: var(--muted); }

    .site-activity {
      background: var(--surface2);
      border-radius: 7px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
    }

    .sa-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .sa-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      white-space: nowrap;
    }

    .sa-val { font-size: 12px; font-weight: 500; text-align: right; }

    .mha-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      align-self: flex-start;
      margin-top: 2px;
    }

    .card-address {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
    }

    .card-desc {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meta-key {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      font-weight: 600;
    }

    .meta-val {
      font-size: 13px;
      font-weight: 500;
    }

    .card-footer {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-type {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .card-link {
      color: var(--accent);
      font-size: 12px;
      text-decoration: none;
      font-weight: 600;
    }
    .card-link:hover { text-decoration: underline; }
    .card-link.dr    { color: #c084fc; }
    .card-link.maps { color: #34d399; }
    .card-link.sip  { color: #fb923c; }

    .card-link:hover { text-decoration: underline; }

    /* ── State messages ── */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .state-msg .icon { font-size: 40px; margin-bottom: 12px; }
    .state-msg h3 { font-size: 16px; margin-bottom: 6px; color: var(--text); }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .last-updated {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      padding: 8px 0 0;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1 id="page-title">Seattle · Large Developments</h1>
    <p>Seattle, WA · Multifamily &amp; Office · $1M+ projects · Live SDCI data</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="num" id="stat-total">—</div><div class="label">Projects</div></div>
    <div class="stat"><div class="num" id="stat-multifamily">—</div><div class="label">Multifamily</div></div>
    <div class="stat"><div class="num" id="stat-office">—</div><div class="label">Office / Mixed</div></div>
    <div class="stat"><div class="num" id="stat-value">—</div><div class="label">Total Value</div></div>
  </div>
</header>

<div class="controls">
  <label>Neighborhood</label>
  <select id="filter-neighborhood">
    <option value="">All Seattle</option>
  </select>

  <label>Status</label>
  <select id="filter-status">
    <option value="">All</option>
    <option value="issued">In Progress</option>
    <option value="complete">Completed</option>
    <option value="review">In Review</option>
    <option value="pending">Pending / Applied</option>
    <option value="cancelled">Cancelled</option>
  </select>

  <label>Building Use</label>
  <select id="filter-use">
    <option value="">All</option>
    <option value="multifamily">Multifamily / Residential</option>
    <option value="office">Office</option>
    <option value="mixed-use">Mixed-Use</option>
    <option value="commercial">Commercial</option>
  </select>

  <label>Min Value</label>
  <select id="filter-minval">
    <option value="1000000">$1M+</option>
    <option value="5000000">$5M+</option>
    <option value="10000000">$10M+</option>
    <option value="25000000">$25M+</option>
    <option value="50000000">$50M+</option>
  </select>

  <label>Sort</label>
  <select id="sort-by">
    <option value="value_desc">Highest Value</option>
    <option value="date_desc">Newest First</option>
    <option value="date_asc">Oldest First</option>
    <option value="address">Address A–Z</option>
  </select>

  <input type="text" id="search" placeholder="Search address or description…" style="min-width:200px" />

  <div class="view-toggle">
    <button id="btn-grid" class="active" onclick="setView('grid')">⊞ Cards</button>
    <button id="btn-map" onclick="setView('map')">⊕ Map</button>
  </div>
</div>

<main>
  <div id="map-view"><div id="map"></div></div>
  <div id="grid-view">
    <div class="state-msg">
      <div class="spinner"></div>
      <h3>Loading permits…</h3>
      <p>Fetching from Seattle Open Data</p>
    </div>
  </div>
  <div class="last-updated" id="last-updated"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// ── State ────────────────────────────────────────────────────────────────────
let allPermits = [];   // all Seattle $1M+ permits (no geo filter)
let map = null;
let markers = [];
let currentView = "grid";

// ── Fetch ────────────────────────────────────────────────────────────────────
async function fetchPermits() {
  const params = new URLSearchParams({
    "$limit": "5000",
    "$order": "estprojectcost DESC",
    "$where": `estprojectcost >= ${MIN_VALUE} AND latitude IS NOT NULL`
  });
  const res = await fetch(`${API}?${params}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function inBounds(p, b) {
  const lat = parseFloat(p.latitude), lon = parseFloat(p.longitude);
  if (!lat || !lon) return false;
  return lat >= b.minLat && lat <= b.maxLat && lon >= b.minLon && lon <= b.maxLon;
}

// ── Building use classification ───────────────────────────────────────────────
function getBuildingUse(p) {
  const desc  = (p.description || "").toLowerCase();
  const ptype = (p.permittypemapped || p.permitclassmapped || "").toLowerCase();

  // Mixed-use first (contains both residential + commercial)
  if (/mixed.?use|retail.{0,30}resid|resid.{0,30}retail|ground.?floor.{0,20}(retail|commercial)/.test(desc))
    return "mixed-use";

  // Multifamily residential
  if (/apart|multifamily|multi.?family|condo|condominium|\badu\b|townhome|townhouse|\bdwelling unit|\bunits?\b/.test(desc) ||
      /residential/i.test(ptype))
    return "multifamily";

  // Office / commercial
  if (/\boffice\b|coworking|co.working|workspace/.test(desc)) return "office";
  if (/commercial|retail|hotel|hospit/.test(desc)) return "commercial";

  return "other";
}

function useLabel(key) {
  return { multifamily:"Multifamily", office:"Office", "mixed-use":"Mixed-Use",
           commercial:"Commercial", other:"Other" }[key] ?? key;
}

// Extract unit count — prefer the dedicated API field, fall back to description parsing
function extractUnits(p) {
  const added = parseInt(p.housingunitsadded, 10);
  if (added > 0 && added < 10000) return added;
  const total = parseInt(p.housingunits, 10);
  if (total > 0 && total < 10000) return total;
  const desc = p.description || "";
  const m = desc.match(/(\d[\d,]*)\s*(?:dwelling\s+)?units?/i) ||
            desc.match(/(\d[\d,]*)\s*(?:apartment|condo|resid)/i);
  if (!m) return null;
  const n = parseInt(m[1].replace(/,/g, ""), 10);
  return n > 0 && n < 10000 ? n : null;
}

// ── Address index (permits for selected neighborhood, any value) ──────────────
let addressIndex = new Map(); // normalizedAddress → permit[]
let historyLoaded = false;    // true once a neighborhood's history has been fetched

function normalizeAddr(p) {
  return (p.originaladdress1 || p.address || "").toUpperCase().trim().replace(/\s+/g, " ");
}

function buildAddressIndex(permits) {
  addressIndex = new Map();
  for (const p of permits) {
    const key = normalizeAddr(p);
    if (!key) continue;
    if (!addressIndex.has(key)) addressIndex.set(key, []);
    addressIndex.get(key).push(p);
  }
  // Sort each group newest first
  for (const arr of addressIndex.values()) {
    arr.sort((a, b) =>
      new Date(b.issueddate || b.applieddate || 0) -
      new Date(a.issueddate || a.applieddate || 0));
  }
}

function sitePermitsFor(p) {
  return addressIndex.get(normalizeAddr(p)) || [];
}

// ── MHA (Mandatory Housing Affordability) detection ───────────────────────────
const MHA = {
  paid:           { label: "MHA Paid",           color: "#34d399", bg: "rgba(52,211,153,0.15)" },
  performance:    { label: "MHA Performance",     color: "#63b3ed", bg: "rgba(99,179,237,0.15)" },
  exempt:         { label: "MHA Exempt",          color: "#94a3b8", bg: "rgba(100,116,139,0.12)" },
  "likely-cleared":{ label: "MHA Likely Cleared", color: "#34d399", bg: "rgba(52,211,153,0.10)" },
  noted:          { label: "MHA Referenced",      color: "#fbbf24", bg: "rgba(251,191,36,0.12)" },
  pending:        { label: "MHA Pending",         color: "#fbbf24", bg: "rgba(251,191,36,0.12)" },
  unknown:        { label: "MHA Unknown",         color: "#475569", bg: "rgba(100,116,139,0.08)" },
};

function getMHAStatus(p, sitePermits) {
  const texts = [p, ...sitePermits].map(x => (x.description || "").toLowerCase());

  for (const t of texts) {
    if (/mha.{0,40}exempt|exempt.{0,40}mha/.test(t))           return "exempt";
    if (/mha.{0,40}(paid|payment|fee paid)|payment.{0,40}mha/.test(t)) return "paid";
    if (/mha.{0,40}performance|performance.{0,40}mha/.test(t)) return "performance";
    if (/\bmha\b|mandatory housing affordability/.test(t))      return "noted";
  }

  // Heuristic: large permits require MHA clearance before permit issuance in Seattle
  const status = getStatus(p);
  if (status === "complete" || status === "issued") return "likely-cleared";
  if (status === "review" || status === "pending") return "pending";
  return "unknown";
}

// ── Status helpers ───────────────────────────────────────────────────────────
function getStatus(p) {
  const s = (p.statuscurrent || p.statusdescription || p.status || "").toLowerCase();
  if (s.includes("final") || s.includes("complete") || s.includes("closed")) return "complete";
  if (s.includes("issued") || s.includes("permit issued")) return "issued";
  if (s.includes("review") || s.includes("design") || s.includes("in queue") ||
      s.includes("correction") || s.includes("additional info")) return "review";
  if (s.includes("pending") || s.includes("application") || s.includes("submitted") ||
      s.includes("accepted")) return "pending";
  if (s.includes("cancel") || s.includes("void") || s.includes("withdrawn") ||
      s.includes("expired")) return "cancelled";
  return "other";
}

function statusLabel(key) {
  return { issued:"In Progress", complete:"Completed", review:"In Review",
           pending:"Applied / Pending", cancelled:"Cancelled", other:"Other" }[key] ?? key;
}

function fmtValue(v) {
  const n = parseFloat(v);
  if (!n) return "—";
  if (n >= 1e9) return `$${(n/1e9).toFixed(2)}B`;
  if (n >= 1e6) return `$${(n/1e6).toFixed(1)}M`;
  if (n >= 1e3) return `$${(n/1e3).toFixed(0)}K`;
  return `$${n.toLocaleString()}`;
}

function fmtDate(d) {
  if (!d) return "—";
  return new Date(d).toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" });
}

// ── Filter / sort ─────────────────────────────────────────────────────────────
function applyFilters() {
  const nbF      = document.getElementById("filter-neighborhood").value;
  const statusF  = document.getElementById("filter-status").value;
  const useF     = document.getElementById("filter-use").value;
  const minValF  = parseFloat(document.getElementById("filter-minval").value) || MIN_VALUE;
  const sortF    = document.getElementById("sort-by").value;
  const searchF  = document.getElementById("search").value.toLowerCase();
  const nbBounds = nbF ? NEIGHBORHOODS[nbF] : null;

  let list = allPermits.filter(p => {
    if (nbBounds && !inBounds(p, nbBounds)) return false;
    if ((parseFloat(p.estprojectcost)||0) < minValF) return false;
    if (statusF && getStatus(p) !== statusF) return false;
    if (useF && getBuildingUse(p) !== useF) return false;
    if (searchF) {
      const hay = [(p.originaladdress1||""), (p.description||""), (p.permitnum||"")].join(" ").toLowerCase();
      if (!hay.includes(searchF)) return false;
    }
    return true;
  });

  list.sort((a, b) => {
    if (sortF === "date_desc") return new Date(b.issueddate||b.applieddate||0) - new Date(a.issueddate||a.applieddate||0);
    if (sortF === "date_asc")  return new Date(a.issueddate||a.applieddate||0) - new Date(b.issueddate||b.applieddate||0);
    if (sortF === "address")   return (a.originaladdress1||"").localeCompare(b.originaladdress1||"");
    return (parseFloat(b.estprojectcost)||0) - (parseFloat(a.estprojectcost)||0);
  });

  updateStats(list);
  renderGrid(list);
  if (currentView === "map") renderMap(list);

  // Update title and map view
  const title = nbF ? `${nbF} · Developments` : "Seattle · Large Developments";
  document.getElementById("page-title").textContent = title;
  document.title = title;
  if (map) {
    if (nbBounds) map.setView(NEIGHBORHOODS[nbF].center, NEIGHBORHOODS[nbF].zoom, { animate: true });
    else map.setView([47.608, -122.335], 12, { animate: true });
  }
}

// ── Permit type label ─────────────────────────────────────────────────────────
function getPermitTypeLabel(p) {
  const type = (p.permittypemapped || "").toLowerCase().trim();
  const desc = (p.permittypedesc  || "").toLowerCase().trim();
  if (type === "building") {
    if (desc === "new" || desc.startsWith("new "))    return { label: "New Construction", cls: "new-construction" };
    if (desc.includes("alter") || desc.includes("addition")) return { label: "Alteration", cls: "alteration" };
    if (desc.includes("demo"))                        return { label: "Demolition",        cls: "demolition" };
    if (desc.includes("revision"))                    return { label: "Revision",          cls: "" };
    if (desc.includes("change of use"))               return { label: "Change of Use",     cls: "alteration" };
    return { label: "Building", cls: "" };
  }
  if (type === "demolition")          return { label: "Demolition",     cls: "demolition" };
  if (type.includes("land use"))      return { label: "Land Use / MUP", cls: "land-use" };
  if (type === "mechanical")          return { label: "Mechanical",      cls: "" };
  if (type === "electrical")          return { label: "Electrical",      cls: "" };
  if (type === "grading")             return { label: "Grading",         cls: "" };
  if (type === "fire")                return { label: "Fire Code",       cls: "" };
  const raw = type || (p.permitclassmapped || "");
  return { label: raw ? raw.replace(/\b\w/g, c => c.toUpperCase()) : "Permit", cls: "" };
}

function hasDesignReview(p) {
  const desc = (p.description || "").toLowerCase();
  const type = (p.permittypemapped || "").toLowerCase();
  return type.includes("land use") || desc.includes("design review") || desc.includes("dr required");
}

// ── Render grid ──────────────────────────────────────────────────────────────
function renderGrid(permits) {
  const grid = document.getElementById("grid-view");

  if (!permits.length) {
    grid.innerHTML = `<div class="state-msg"><div class="icon">🏙</div>
      <h3>No results</h3><p>Try adjusting your filters.</p></div>`;
    return;
  }

  grid.innerHTML = permits.map(p => {
    const status     = getStatus(p);
    const use        = getBuildingUse(p);
    const value      = fmtValue(p.estprojectcost);
    const appDate    = fmtDate(p.applieddate);
    const issDate    = fmtDate(p.issueddate);
    const addr       = p.originaladdress1 || "Address unknown";
    const desc       = p.description || "No description provided.";
    const num        = p.permitnum || "—";
    const units      = extractUnits(p);
    const detailUrl  = p.link?.url ||
      `https://services.seattle.gov/portal/customize/LinkToRecord.aspx?altId=${encodeURIComponent(num)}`;
    const mapsUrl    = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr + ", Seattle, WA")}`;
    const sipId      = SIP_INDEX[addr.toUpperCase().trim().replace(/\s+/g, " ")];
    const sipUrl     = sipId ? `https://www.seattleinprogress.com/project/${sipId}` : null;
    const ptLabel    = getPermitTypeLabel(p);
    const dr         = hasDesignReview(p);

    // Site history from address index
    const site        = sitePermitsFor(p);
    const siteCount   = site.length;
    const lastPermit  = site[0];
    const lastDate    = lastPermit ? fmtDate(lastPermit.issueddate || lastPermit.applieddate) : "—";
    const lastPT      = lastPermit ? getPermitTypeLabel(lastPermit) : null;
    const lastNum     = lastPermit ? (lastPermit.permitnum || "") : "";
    const lastUrl     = lastNum
      ? `https://services.seattle.gov/portal/customize/LinkToRecord.aspx?altId=${encodeURIComponent(lastNum)}`
      : "";
    const historyNote = !historyLoaded
      ? `<span style="color:var(--muted);font-style:italic;font-size:11px">Select a neighborhood above</span>`
      : `${siteCount} permit${siteCount !== 1 ? "s" : ""} on file`;

    // MHA
    const mhaKey  = getMHAStatus(p, site);
    const mha     = MHA[mhaKey];

    return `<div class="card">
      <div class="card-header">
        <a class="permit-num" href="${detailUrl}" target="_blank" rel="noopener">${num}</a>
        <span class="badge ${status}">${statusLabel(status)}</span>
      </div>
      <div class="card-address">${addr}</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:-4px">
        <span class="permit-type-tag ${ptLabel.cls}">${ptLabel.label}</span>
        <span class="use-tag ${use}">${useLabel(use)}</span>
        ${units ? `<span style="font-size:11px;color:var(--muted)">${units} units</span>` : ""}
      </div>
      <div class="card-desc">${desc}</div>
      <div class="card-meta">
        <div class="meta-item">
          <span class="meta-key">Est. Value</span>
          <span class="meta-val" style="color:var(--accent);font-weight:700">${value}</span>
        </div>
        <div class="meta-item">
          <span class="meta-key">Applied</span>
          <span class="meta-val">${appDate}</span>
        </div>
        <div class="meta-item">
          <span class="meta-key">Issued</span>
          <span class="meta-val">${issDate}</span>
        </div>
      </div>

      <div class="site-activity">
        <div class="sa-row">
          <span class="sa-label">Site History</span>
          <span class="sa-val">${historyNote}</span>
        </div>
        ${historyLoaded ? `
        <div class="sa-row">
          <span class="sa-label">Last Filed</span>
          <span class="sa-val">${lastDate}${lastNum
            ? ` · <a href="${lastUrl}" target="_blank" rel="noopener" style="font-family:monospace;font-size:11px;color:var(--accent);text-decoration:none" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${lastNum}</a>`
            : ""}</span>
        </div>
        <div class="sa-row">
          <span class="sa-label">Last Type</span>
          <span class="sa-val">${lastPT ? `<span class="permit-type-tag ${lastPT.cls}" style="font-size:9px">${lastPT.label}</span>` : "—"}</span>
        </div>` : ""}
        <div class="mha-badge" style="background:${mha.bg};color:${mha.color}">
          ${mha.label}
        </div>
      </div>

      <div class="card-footer">
        <div class="card-links">
          <a class="card-link" href="${detailUrl}" target="_blank" rel="noopener">Permit Portal ↗</a>
          ${dr ? `<a class="card-link dr" href="${detailUrl}" target="_blank" rel="noopener">Design Review Docs ↗</a>` : ""}
          ${sipUrl ? `<a class="card-link sip" href="${sipUrl}" target="_blank" rel="noopener">SeattleInProgress ↗</a>` : ""}
          <a class="card-link maps" href="${mapsUrl}" target="_blank" rel="noopener">Google Maps ↗</a>
        </div>
      </div>
    </div>`;
  }).join("");
}

// ── Render map ────────────────────────────────────────────────────────────────
const MAP_COLORS = {
  issued:    "#fbbf24",  // yellow  — in progress / active construction
  complete:  "#34d399",  // green   — finaled / complete
  review:    "#6c8ef5",  // blue    — in design review
  pending:   "#a78bfa",  // purple  — applied / pending
  cancelled: "#f87171",  // red     — cancelled / void
  other:     "#64748b",  // grey    — unknown
};

const MAP_LEGEND_ITEMS = [
  { key: "issued",    label: "In Progress" },
  { key: "complete",  label: "Completed" },
  { key: "review",    label: "In Review" },
  { key: "pending",   label: "Pending / Applied" },
  { key: "cancelled", label: "Cancelled" },
];

function renderMap(permits) {
  if (!map) {
    map = L.map("map").setView([47.608, -122.335], 12);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
      maxZoom: 19
    }).addTo(map);

    // Inject legend into map container (not as a Leaflet control so it's always visible)
    const legend = document.createElement("div");
    legend.id = "map-legend";
    legend.innerHTML = `<div class="leg-title">Status</div>` +
      MAP_LEGEND_ITEMS.map(item =>
        `<div class="leg-row">
          <div class="leg-dot" style="background:${MAP_COLORS[item.key]}"></div>
          <span>${item.label}</span>
        </div>`
      ).join("");
    document.getElementById("map").appendChild(legend);
  }

  markers.forEach(m => m.remove());
  markers = [];

  const colors = MAP_COLORS;

  permits.forEach(p => {
    const lat = parseFloat(p.latitude);
    const lon = parseFloat(p.longitude);
    if (!lat || !lon) return;

    const status = getStatus(p);
    const color  = colors[status];

    const circle = L.circleMarker([lat, lon], {
      radius: 7, fillColor: color, color: "#fff",
      weight: 1.5, opacity: 0.9, fillOpacity: 0.85
    }).addTo(map);

    const use   = getBuildingUse(p);
    const units = extractUnits(p);
    circle.bindPopup(`
      <div style="font-family:sans-serif;min-width:220px">
        <div style="font-weight:700;font-size:13px;margin-bottom:4px">${p.originaladdress1 || p.address || "Unknown"}</div>
        <div style="font-size:11px;color:#888;margin-bottom:6px">${p.permitnum || ""}</div>
        <div style="font-size:12px;margin-bottom:8px;line-height:1.4">${(p.description||"").slice(0,160)}…</div>
        <div style="font-size:11px;line-height:1.8">
          <b>Use:</b> ${useLabel(use)}${units ? ` · ${units} units` : ""}<br>
          <b>Value:</b> ${fmtValue(p.estprojectcost)}<br>
          <b>Status:</b> ${statusLabel(status)}<br>
          <b>Applied:</b> ${fmtDate(p.applieddate)}<br>
          <b>Issued:</b> ${fmtDate(p.issueddate)}
        </div>
      </div>`);

    markers.push(circle);
  });
}

// ── View toggle ───────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById("map-view").style.display  = v === "map"  ? "block" : "none";
  document.getElementById("grid-view").style.display = v === "grid" ? "grid"  : "none";
  document.getElementById("btn-grid").classList.toggle("active", v === "grid");
  document.getElementById("btn-map").classList.toggle("active",  v === "map");
  if (v === "map") {
    const filtered = getFilteredList();
    renderMap(filtered);
    setTimeout(() => map && map.invalidateSize(), 100);
  }
}

function getFilteredList() {
  const nbF      = document.getElementById("filter-neighborhood").value;
  const statusF  = document.getElementById("filter-status").value;
  const useF     = document.getElementById("filter-use").value;
  const minValF  = parseFloat(document.getElementById("filter-minval").value) || MIN_VALUE;
  const searchF  = document.getElementById("search").value.toLowerCase();
  const nbBounds = nbF ? NEIGHBORHOODS[nbF] : null;
  return allPermits.filter(p => {
    if (nbBounds && !inBounds(p, nbBounds)) return false;
    if ((parseFloat(p.estprojectcost)||0) < minValF) return false;
    if (statusF && getStatus(p) !== statusF) return false;
    if (useF && getBuildingUse(p) !== useF) return false;
    if (searchF) {
      const hay = [(p.originaladdress1||""), (p.description||""), (p.permitnum||"")].join(" ").toLowerCase();
      if (!hay.includes(searchF)) return false;
    }
    return true;
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats(permits) {
  const mf       = permits.filter(p => getBuildingUse(p) === "multifamily").length;
  const office   = permits.filter(p => ["office","mixed-use","commercial"].includes(getBuildingUse(p))).length;
  const totalVal = permits.reduce((s, p) => s + (parseFloat(p.estprojectcost)||0), 0);

  document.getElementById("stat-total").textContent       = permits.length.toLocaleString();
  document.getElementById("stat-multifamily").textContent = mf.toLocaleString();
  document.getElementById("stat-office").textContent      = office.toLocaleString();
  document.getElementById("stat-value").textContent       = fmtValue(totalVal);
}

// ── Secondary fetch: neighborhood site history (only when NB is selected) ─────
async function fetchSiteHistory(bounds) {
  if (!bounds) return [];
  const w = `latitude >= ${bounds.minLat} AND latitude <= ${bounds.maxLat} ` +
            `AND longitude >= ${bounds.minLon} AND longitude <= ${bounds.maxLon}`;
  const params = new URLSearchParams({
    "$select": "permitnum,originaladdress1,issueddate,applieddate,permittypemapped,permittypedesc,permitclassmapped,statuscurrent,description,estprojectcost",
    "$limit": "5000",
    "$order": "issueddate DESC",
    "$where": w
  });
  const res = await fetch(`${API}?${params}`);
  if (!res.ok) { console.warn("fetchSiteHistory failed:", res.status); return []; }
  return res.json();
}

// ── Populate neighborhood dropdown ────────────────────────────────────────────
function populateNeighborhoodDropdown() {
  const sel = document.getElementById("filter-neighborhood");
  Object.keys(NEIGHBORHOODS).sort().forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  populateNeighborhoodDropdown();
  // Pre-fill search from ?search= URL param (useful for deep-linking)
  const urlSearch = new URLSearchParams(window.location.search).get("search");
  if (urlSearch) document.getElementById("search").value = urlSearch;
  try {
    allPermits = await fetchPermits();
    applyFilters();
    document.getElementById("last-updated").textContent =
      `Last fetched: ${new Date().toLocaleString()} · ${allPermits.length} citywide permits loaded · select a neighborhood to see site history`;
  } catch (err) {
    document.getElementById("grid-view").innerHTML = `
      <div class="state-msg">
        <div class="icon">⚠️</div>
        <h3>Could not load permits</h3>
        <p>${err.message}</p>
        <p style="margin-top:8px;font-size:12px">Make sure you have an internet connection and try refreshing.</p>
      </div>`;
  }
}

// ── Neighborhood change: re-fetch site history for the selected area ──────────
document.getElementById("filter-neighborhood").addEventListener("change", async function() {
  const nbF    = this.value;
  const bounds = nbF ? NEIGHBORHOODS[nbF] : null;
  addressIndex = new Map();
  historyLoaded = false;
  if (bounds) {
    applyFilters(); // render immediately so cards appear while history loads
    const history = await fetchSiteHistory(bounds);
    buildAddressIndex(history);
    historyLoaded = true;
    document.getElementById("last-updated").textContent =
      `${nbF} · ${history.length} site history records loaded`;
    applyFilters(); // re-render now that history is available
  } else {
    document.getElementById("last-updated").textContent =
      `All Seattle · select a neighborhood to load site history`;
    applyFilters();
  }
});

// ── Event listeners ───────────────────────────────────────────────────────────
["filter-status","filter-use","filter-minval","sort-by"].forEach(id =>
  document.getElementById(id).addEventListener("change", applyFilters));

document.getElementById("search").addEventListener("input", applyFilters);

init();
</script>
