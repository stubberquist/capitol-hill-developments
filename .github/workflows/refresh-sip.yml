name: Refresh Embedded Data (SIP index + Zillow market data)

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 6am PT (14:00 UTC)
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and embed SIP index
        run: bash refresh-sip-index.sh

      - name: Fetch and embed Zillow market data
        run: bash refresh-market-data.sh

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet index.html || (
            git add index.html &&
            git commit -m "chore: refresh embedded data $(date +%Y-%m-%d)" &&
            git push
          )
