name: Refresh Embedded Data (SIP index + Zillow market data)

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 6am PT (14:00 UTC)
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and embed SIP index
        run: bash refresh-sip-index.sh

      - name: Fetch and embed market data (Zillow + FRED)
        run: bash refresh-market-data.sh

      - name: Build weekly digest (whats-new.html + feed.xml)
        run: bash build-whats-new.sh

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html whats-new.html feed.xml
          git diff --cached --quiet || (
            git commit -m "chore: refresh embedded data $(date +%Y-%m-%d)" &&
            git push
          )

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Weekly data refresh failed — $(date +%Y-%m-%d)" \
            --body "The scheduled embedded-data refresh (SIP index / Zillow / FRED) failed. Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || true
